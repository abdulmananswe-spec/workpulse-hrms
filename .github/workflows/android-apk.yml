name: Android APK

on:
  push:
    branches: [main, master]
    paths:
      - "mobile-app/**"
      - ".github/workflows/android-apk.yml"
  pull_request:
    paths:
      - "mobile-app/**"
      - ".github/workflows/android-apk.yml"
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  EXPO_APP_DIR: mobile-app

jobs:
  build-debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify Expo project files
        run: |
          set -euo pipefail

          # mobile-app is registered as a git submodule in this repo but .gitmodules
          # is missing, so a plain checkout leaves the folder empty on GitHub Actions.
          if [ ! -f "${EXPO_APP_DIR}/package.json" ]; then
            if git ls-tree HEAD "${EXPO_APP_DIR}" 2>/dev/null | grep -q "160000 commit"; then
              echo "Detected git submodule pointer for ${EXPO_APP_DIR}; attempting init..."
              git submodule update --init --recursive "${EXPO_APP_DIR}" || true
            fi
          fi

          if [ ! -f "${EXPO_APP_DIR}/package.json" ] || [ ! -f "${EXPO_APP_DIR}/app.json" ]; then
            echo "::error::Expo project not found at ${EXPO_APP_DIR}/"
            echo ""
            echo "This monorepo expects the Expo app at: ${EXPO_APP_DIR}/package.json"
            echo "Checkout left an empty or missing folder — usually a broken git submodule."
            echo ""
            echo "Fix locally, then push:"
            echo "  git rm --cached ${EXPO_APP_DIR}"
            echo "  git add ${EXPO_APP_DIR}/"
            echo "  git commit -m \"Track mobile-app as regular directory\""
            echo "  git push"
            echo ""
            echo "Repository root listing:"
            ls -la
            if [ -d "${EXPO_APP_DIR}" ]; then
              echo ""
              echo "${EXPO_APP_DIR}/ listing:"
              ls -la "${EXPO_APP_DIR}"
            fi
            exit 1
          fi

          echo "Expo project verified at ${EXPO_APP_DIR}/"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Install npm dependencies
        working-directory: mobile-app
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "::warning::mobile-app/package-lock.json not found — falling back to npm install"
            npm install
          fi

      - name: Write .env for Expo bundle
        working-directory: mobile-app
        run: |
          {
            echo "EXPO_PUBLIC_SUPABASE_URL=${EXPO_PUBLIC_SUPABASE_URL:-https://placeholder.supabase.co}"
            echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${EXPO_PUBLIC_SUPABASE_ANON_KEY:-placeholder-anon-key}"
          } > .env

      - name: Expo prebuild (Android)
        working-directory: mobile-app
        run: npm exec expo prebuild -- --platform android --no-install

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-mobile-${{ hashFiles('mobile-app/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-mobile-
            ${{ runner.os }}-gradle-

      - name: Gradle assembleDebug
        working-directory: mobile-app/android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace -PreactNativeArchitectures=arm64-v8a

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: workpulse-hrms-debug-apk
          path: mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        working-directory: mobile-app
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          echo "## WorkPulse HRMS Debug APK" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Expo project:** \`mobile-app/\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Package:** \`com.workpulse.hrms\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${GITHUB_SHA::7}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **APK size:** $(du -h "$APK" | cut -f1)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Download:** Actions → this workflow run → Artifacts → \`workpulse-hrms-debug-apk\`" >> "$GITHUB_STEP_SUMMARY"
