name: Android APK

on:
  push:
    branches: [main, master]
    paths:
      - "mobile-app/**"
      - "package.json"
      - "package-lock.json"
      - "app.json"
      - ".github/workflows/android-apk.yml"
  pull_request:
    paths:
      - "mobile-app/**"
      - "package.json"
      - "package-lock.json"
      - "app.json"
      - ".github/workflows/android-apk.yml"
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve Expo project directory
        id: expo
        run: |
          if [ -f mobile-app/package.json ] && grep -q '"expo"' mobile-app/package.json; then
            echo "dir=mobile-app" >> "$GITHUB_OUTPUT"
            echo "Using monorepo path: mobile-app/"
          elif [ -f package.json ] && grep -q '"expo"' package.json; then
            echo "dir=." >> "$GITHUB_OUTPUT"
            echo "Using repository root as Expo project"
          else
            echo "::error::No Expo package.json found."
            echo "Expected mobile-app/package.json (monorepo) or package.json at repo root."
            echo ""
            echo "Repository contents:"
            ls -la
            if [ -d mobile-app ]; then
              echo ""
              echo "mobile-app/ contents:"
              ls -la mobile-app
            fi
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Install npm dependencies
        working-directory: ${{ steps.expo.outputs.dir }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "::warning::package-lock.json not found — falling back to npm install"
            npm install
          fi

      - name: Write .env for Expo bundle
        working-directory: ${{ steps.expo.outputs.dir }}
        run: |
          {
            echo "EXPO_PUBLIC_SUPABASE_URL=${EXPO_PUBLIC_SUPABASE_URL:-https://placeholder.supabase.co}"
            echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${EXPO_PUBLIC_SUPABASE_ANON_KEY:-placeholder-anon-key}"
          } > .env

      - name: Expo prebuild (Android)
        working-directory: ${{ steps.expo.outputs.dir }}
        run: npm exec expo prebuild -- --platform android --no-install

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ steps.expo.outputs.dir }}-${{ hashFiles(format('{0}/android/gradle/wrapper/gradle-wrapper.properties', steps.expo.outputs.dir)) }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ steps.expo.outputs.dir }}-
            ${{ runner.os }}-gradle-

      - name: Gradle assembleDebug
        working-directory: ${{ steps.expo.outputs.dir }}/android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon --stacktrace -PreactNativeArchitectures=arm64-v8a

      - name: Set APK artifact path
        id: apk
        run: |
          if [ "${{ steps.expo.outputs.dir }}" = "." ]; then
            echo "path=android/app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_OUTPUT"
          else
            echo "path=${{ steps.expo.outputs.dir }}/android/app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: workpulse-hrms-debug-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30
          if-no-files-found: error

      - name: Build summary
        working-directory: ${{ steps.expo.outputs.dir }}
        run: |
          APK="android/app/build/outputs/apk/debug/app-debug.apk"
          echo "## WorkPulse HRMS Debug APK" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Expo project:** \`${{ steps.expo.outputs.dir }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Package:** \`com.workpulse.hrms\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${GITHUB_SHA::7}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **APK size:** $(du -h "$APK" | cut -f1)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Download:** Actions → this workflow run → Artifacts → \`workpulse-hrms-debug-apk\`" >> "$GITHUB_STEP_SUMMARY"
