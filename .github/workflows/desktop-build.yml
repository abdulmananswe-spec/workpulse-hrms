name: Build & Package Windows Desktop App

on:
  push:
    tags:
      - 'v*' # Trigger build only when version tags are pushed (e.g. v1.0.0)

jobs:
  build-desktop:
    name: Compile & Package MSI/EXE Installers
    runs-on: windows-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'desktop-app/package-lock.json'

      - name: Install Desktop Subdirectory Dependencies
        working-directory: desktop-app
        run: npm ci

      - name: Setup Rust Stable Toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust Cargo Index & Build Assets
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop-app/src-tauri

      - name: Set Staging Environment URL (If Tag Contains -staging)
        if: contains(github.ref, '-staging')
        shell: bash
        run: echo "APP_ENV=staging" >> $GITHUB_ENV

      - name: Set Production Environment URL (Default Release)
        if: "!contains(github.ref, '-staging')"
        shell: bash
        run: echo "APP_ENV=production" >> $GITHUB_ENV

      - name: Build Tauri Desktop Native Binaries
        working-directory: desktop-app
        run: npm run tauri build --release

      - name: Digitally Sign Executable (Optional if EV PFX secret is provided)
        if: secrets.SIGNING_CERTIFICATE_PFX != ''
        shell: pwsh
        env:
          SIGNING_CERTIFICATE_PFX: ${{ secrets.SIGNING_CERTIFICATE_PFX }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:TEMP "cert.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:SIGNING_CERTIFICATE_PFX))
          # Invoke signtool on compiled executables
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.19041.0\x64\signtool.exe" sign /f $pfxPath /p $env:SIGNING_CERTIFICATE_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 "desktop-app/src-tauri/target/release/workpulse-hrms.exe"
          Write-Host "App binary signed successfully."

      - name: Create Production Release Draft & Upload Installers
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref, '-staging') || contains(github.ref, '-beta') }}
          files: |
            desktop-app/src-tauri/target/release/bundle/msi/*.msi
            desktop-app/src-tauri/target/release/bundle/nsis/*.exe
            desktop-app/src-tauri/target/release/bundle/updater/*.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

